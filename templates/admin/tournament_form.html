{% extends "base.html" %}{% block content %}
<h2>Ny turnering</h2>
<form class="stack" method="post">
<label>Namn <input name="name" required autofocus></label>
<label>Datum <input type="date" name="date" required></label>
<label>Plats <input name="location" required></label>
<label>Beskrivning <textarea name="description" rows="4"></textarea></label>
<label>Antal rundor <input type="number" name="num_rounds" value="3" min="1" max="10"></label>
<label>Poangbegransning per lista <input type="number" name="points_limit" value="800" min="0"></label>
<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
<label>TP vinst <input type="number" name="win_tp" value="3"></label>
<label>TP oavgjort <input type="number" name="draw_tp" value="1"></label>
<label>TP forlust <input type="number" name="loss_tp" value="0"></label>
</div>
<div class="btn-row"><button class="btn btn-primary" type="submit">Skapa</button>
<a class="btn" href="{{ url_for('admin.dashboard') }}">Avbryt</a></div></form>
{% endblock %}
